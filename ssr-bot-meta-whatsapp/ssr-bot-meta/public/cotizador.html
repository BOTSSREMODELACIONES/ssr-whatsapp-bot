// CAMBIO 2 ─ Reemplazar TODA la función calcTotals() con esta versión
// ═══════════════════════════════════════════════════════════════════

function calcTotals(){
  const items   = S.items;
  const rawSub  = items.reduce((s,i) => s + i.subtotal, 0);
  const imp     = Math.round(rawSub * IMP);                   // 5% imprevistos (INTERNO, nunca mostrado al cliente)
  const base    = rawSub + imp;                               // base imponible = lo que paga el cliente
  const ivaAmt  = Math.round(base * IVA);

  // ─── Valores INTERNOS (para cálculo y reporte interno Darwin) ───
  return {
    subtotalMat:   items.reduce((s,i) => s + i.matTotal, 0),
    subtotalMO:    items.reduce((s,i) => s + i.moTotal,  0),
    subtotal:      rawSub,          // suma pura de ítems
    imprevistos:   imp,             // 5% (NO se muestra al cliente)
    baseImponible: base,            // subtotal + imprevistos
    iva:           ivaAmt,          // 13% sobre base imponible
    total:         base + ivaAmt - 25000,

    // ─── Valores POR ÍTEM con imprevistos absorbidos en M.O. ───────
    // El imp se distribuye proporcional al subtotal de cada ítem
    // y se suma al moTotal → cliente ve MO ligeramente mayor, TOTAL correcto
    itemsDisplay: items.map(item => {
      const share      = rawSub > 0 ? Math.round((item.subtotal / rawSub) * imp) : 0;
      const moDisplay  = item.moTotal + share;
      return {
        ...item,
        moDisplay,                              // MO con imp absorbido
        subtotalDisplay: item.matTotal + moDisplay,  // subtotal de cara al cliente
      };
    }),

    // ─── Sub total CLIENTE = suma de subtotalsDisplay ≈ base ────────
    // (pequeñas diferencias de redondeo ±₡1 por ítem son despreciables)
    subtotalDisplay: items.reduce((s,i) => {
      const share     = rawSub > 0 ? Math.round((i.subtotal / rawSub) * imp) : 0;
      return s + i.matTotal + i.moTotal + share;
    }, 0),
  };
}

// CAMBIO 6 ─ Reemplazar TODA la función window.doExcel con esta versión
// (fórmulas XLSX reales + ítems obligatorios + MO con imp absorbido)
// ═══════════════════════════════════════════════════════════════════

window.doExcel = function(){
  const T     = calcTotals();
  const c     = S.client;
  const fecha = new Date().toLocaleDateString("es-CR");

  // ─── HOJA 1: Detalle interno (para Darwin, con imprevistos visible) ──────
  const rows = [
    ["SS REMODELACIONES — PRESUPUESTO INTERNO"],
    ["Ref:", c.referencia, "Fecha:", fecha, "Cliente:", c.nombre],
    ["Proyecto:", c.asunto],
    [],
    ["Item","Descripción","Und","Cant","Días","Op","Ay","Mat.Base","Mat+5%","MO","Utilidad","Total MO","TOTAL"],
  ];
  S.items.forEach(item => {
    rows.push([
      item.id, item.descripcion, item.unidad||"Und", item.cantidad||1,
      item.dias, item.operarios, item.ayudantes,
      Math.round(item.matTotal/1.05), item.matTotal,
      item.moBase, item.moUtilidad, item.moTotal, item.subtotal,
    ]);
    (item.materiales||[]).forEach(m =>
      rows.push(["","  > "+m.detalle+" ("+m.fuente+")",m.und,m.cantidad,m.precio_unitario,m.cantidad*m.precio_unitario])
    );
    rows.push(["","Subtotal mat:","","","","","","",item.matTotal]);
    rows.push([]);
  });
  // Totales internos (con imprevistos separado)
  rows.push(["","Sub total","","","","","","","",T.subtotal]);
  rows.push(["","Imprevistos 5% (INTERNO)","","","","","","","",T.imprevistos]);
  rows.push(["","Base imponible","","","","","","","",T.baseImponible]);
  rows.push(["","IVA 13%","","","","","","","",T.iva]);
  rows.push(["","Reembolso visita","","","","","","","",-25000]);
  rows.push(["","TOTAL","","","","","","","",T.total]);

  // ─── HOJA 2: Resumen cliente (imprevistos absorbido en MO, con fórmulas) ──
  const n = T.itemsDisplay.length;  // número de ítems (incluye obligatorios)
  const resumen = [
    ["Descripción","Unidad","Cantidad","Materiales","M.O.","SUB TOTAL"],
    ...T.itemsDisplay.map(i => [
      i.descripcion, i.unidad||"Und", i.cantidad||1,
      i.matTotal, i.moDisplay, i.subtotalDisplay,  // ← MO ya incluye imp
    ]),
    [],
    ["","","","","Sub total",   T.subtotalDisplay],
    ["","","","","IVA 13%",     T.iva],
    ["","","","","Reembolso visita", -25000],
    ["","","","","TOTAL",       T.total],
  ];

  // Columna F: fórmulas en filas de totales
  const sumRow = n + 3;   // fila 1=header, 2..n+1=items, n+2=blank, n+3=Sub total
  const ws2fórmulas = {};
  ws2fórmulas[`F${sumRow}`]   = { f: `SUM(F2:F${n+1})`,   v: T.subtotalDisplay };
  ws2fórmulas[`F${sumRow+1}`] = { f: `F${sumRow}*0.13`,   v: T.iva             };
  // Reembolso: fijo -25000 (ya está en el array)
  ws2fórmulas[`F${sumRow+3}`] = { f: `F${sumRow}+F${sumRow+1}+F${sumRow+2}`, v: T.total };

  const wb  = XLSX.utils.book_new();

  // Hoja interna
  const ws1 = XLSX.utils.aoa_to_sheet(rows);
  ws1["!cols"] = [{wch:5},{wch:38},{wch:8},{wch:7},{wch:6},{wch:5},{wch:5},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws1, "Detalle Interno");

  // Hoja cliente con fórmulas
  const ws2 = XLSX.utils.aoa_to_sheet(resumen);
  ws2["!cols"] = [{wch:40},{wch:8},{wch:10},{wch:14},{wch:14},{wch:16}];
  // Inyectar fórmulas
  Object.entries(ws2fórmulas).forEach(([cell, {f, v}]) => {
    if (ws2[cell]) { ws2[cell].f = f; ws2[cell].v = v; }
    else ws2[cell] = { t: "n", v, f };
  });
  XLSX.utils.book_append_sheet(wb, ws2, "Resumen Cotizacion");

  XLSX.writeFile(wb, c.referencia + "_presupuesto_interno.xlsx");
};
