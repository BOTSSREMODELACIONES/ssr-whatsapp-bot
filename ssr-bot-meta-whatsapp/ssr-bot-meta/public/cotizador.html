<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cotizador SSR">
<title>Cotizador SSR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;background:#F4F6F9;min-height:100vh}
input,textarea,select,button{font-family:inherit}
@media(max-width:600px){input,textarea,select{font-size:16px!important}}
#app{max-width:960px;margin:0 auto}
.hdr{background:#1B3A6B;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:#D4541A;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px;flex-shrink:0}
.steps{display:flex;gap:6px}
.step{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:rgba(255,255,255,.2);color:rgba(255,255,255,.4);transition:.2s}
.step.active{background:#D4541A;color:#fff}
.step.done{background:#2ECC71;color:#fff}
.body{padding:20px 16px}
.sec{font-size:14px;font-weight:600;color:#1B3A6B;border-bottom:2px solid #D4541A;padding-bottom:6px;margin-bottom:12px;display:block}
.lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;display:block}
.inp{width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:13px;outline:none;background:#fff;color:#222}
.inp:focus{border-color:#1B3A6B}
.inp-sm{width:100%;border:1px solid #ddd;border-radius:4px;padding:6px 8px;font-size:12px;outline:none}
.inp-xs{border:1px solid #e5e5e5;border-radius:3px;padding:3px 6px;font-size:12px;outline:none;width:100%}
.btn{border:none;border-radius:6px;padding:10px 18px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:#1B3A6B;color:#fff}
.btn-s{background:#fff;color:#1B3A6B;border:1px solid #1B3A6B}
.btn-g{background:#1E8449;color:#fff}
.btn-o{background:#D4541A;color:#fff}
.btn-t{background:#555;color:#fff}
.card{background:#fff;border-radius:8px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g5{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 1fr;gap:8px;align-items:end;margin-bottom:10px}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}.g5{grid-template-columns:1fr 1fr}}
.err-box{background:#ffeaea;border:1px solid #f5c6c6;border-radius:6px;padding:10px 14px;color:#c0392b;font-size:13px;margin-top:10px;display:none}
.ok-box{background:#f0fff4;border:1px solid #2ECC71;border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:13px;display:none}
.err-box2{background:#fff5f5;border:1px solid #e74c3c;border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:12px;display:none}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:5px 8px;color:#555;font-weight:500;background:#f5f7fb}
.tbl td{border-bottom:1px solid #eee;padding:4px 6px}
.thumb-wrap{position:relative;display:inline-block}
.thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
.thumb-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#e74c3c;color:#fff;border:none;cursor:pointer;font-size:10px}
.cam-btn{width:72px;height:72px;border-radius:6px;border:2px dashed #1B3A6B;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#1B3A6B;font-size:11px;text-align:center;background:#f0f4ff;vertical-align:top}
.pdf-btn{display:inline-flex;align-items:center;gap:6px;background:#f0f4ff;border:2px dashed #1B3A6B;border-radius:6px;padding:10px 16px;cursor:pointer;color:#1B3A6B;font-size:13px}
.pdf-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:12px}
.bar{height:3px;background:linear-gradient(to right,#D4541A,#1B3A6B)}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:16px}
.prog-fill{height:100%;width:60%;background:#1B3A6B;border-radius:2px;animation:slide 2s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-150%)}100%{transform:translateX(250%)}}
.tot-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #eee}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.hidden{display:none}
.preview-tbl th{background:#1B3A6B;color:#fff;padding:6px 8px;font-size:10pt;text-align:right}
.preview-tbl th:first-child{text-align:left}
.preview-tbl td{border:1px solid #D9CFC7;padding:5px 8px;font-size:10pt}
/* ── Grabador de voz ── */
.voz-wrap{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.voz-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-voz{display:inline-flex;align-items:center;gap:6px;border:1.5px solid #1B3A6B;border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s;background:#f0f4ff;color:#1B3A6B}
.btn-voz.grabando{background:#e74c3c;color:#fff;border-color:#e74c3c;animation:pulso 1.2s ease-in-out infinite}
@keyframes pulso{0%,100%{box-shadow:0 0 0 0 rgba(231,76,60,.5)}60%{box-shadow:0 0 0 8px rgba(231,76,60,0)}}
.voz-interim{font-size:12px;color:#555;font-style:italic;min-height:18px;padding:5px 10px;background:#f9f9f9;border-radius:4px;border-left:3px solid #D4541A;display:none}
.voz-interim.visible{display:block}
.voz-status{font-size:11px;color:#888;margin-top:2px}
.voz-ondas{display:none;align-items:center;gap:3px;height:20px}
.voz-ondas.visible{display:flex}
.voz-ondas span{display:inline-block;width:3px;border-radius:2px;background:#e74c3c;animation:onda 1s ease-in-out infinite}
.voz-ondas span:nth-child(1){height:6px;animation-delay:0s}
.voz-ondas span:nth-child(2){height:14px;animation-delay:.15s}
.voz-ondas span:nth-child(3){height:20px;animation-delay:.3s}
.voz-ondas span:nth-child(4){height:14px;animation-delay:.45s}
.voz-ondas span:nth-child(5){height:6px;animation-delay:.6s}
@keyframes onda{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo">SS</div>
      <div>
        <div style="color:#fff;font-weight:600;font-size:15px">Cotizador</div>
        <div style="color:rgba(255,255,255,.55);font-size:11px">SS Remodelaciones</div>
      </div>
    </div>
    <div class="steps">
      <div class="step active" id="s0">1</div>
      <div class="step" id="s1">2</div>
      <div class="step" id="s2">3</div>
      <div class="step" id="s3">4</div>
    </div>
  </div>

  <div class="body" id="main"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
"use strict";
// ── Estado global ─────────────────────────────────────────────────────────────
const S = {
  step: 0,
  client: { nombre:"", email:"", telefono:"", asunto:"", referencia: newRef(), revision:"" },
  notas: "",
  items: [],
  fotos: [],
  pdfs: [],
  saving: false,
  driveOk: null,
  driveErr: null,
};

const COST_OP=27000, COST_AY=20000, IVA=0.13, MAT_OH=0.05, IMP=0.05;
const BACKEND="https://ssr-whatsapp-bot-production.up.railway.app";
// FIX 1 ── Símbolo ₡ como carácter literal (evita problemas de encoding)
const MONEDA="₡";

function newRef(){ return "REF-"+(Math.floor(Math.random()*900)+100)+"-"+String(new Date().getFullYear()).slice(-2); }
const fmt = n => MONEDA+Number(n||0).toLocaleString("es-CR",{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// FIX 5 ── Nombre de archivo con revisión
function nombreArchivo(sufijo){
  const ref = S.client.referencia || "COT";
  const rev = S.client.revision ? ("_REV." + S.client.revision.toString().padStart(2,"0")) : "";
  return ref + rev + "_" + sufijo;
}

function calcItem(item){
  const mats=item.materiales||[];
  const matBase=mats.reduce((s,m)=>s+(+m.cantidad)*(+m.precio_unitario),0);
  const matTotal=Math.round(matBase*(1+MAT_OH));
  const moBase=(+item.dias||1)*((+item.operarios||1)*COST_OP+(+item.ayudantes||0)*COST_AY);
  const moUtilidad=moBase*0.5;
  const moTotal=moBase+moUtilidad;
  return {...item,matTotal,moBase,moUtilidad,moTotal,subtotal:matTotal+moTotal};
}

function calcTotals(){
  const items=S.items;
  const subtotal=items.reduce((s,i)=>s+i.subtotal,0);
  const imp=Math.round(subtotal*IMP);
  const base=subtotal+imp;
  return {
    subtotalMat:items.reduce((s,i)=>s+i.matTotal,0),
    subtotalMO:items.reduce((s,i)=>s+i.moTotal,0),
    subtotal, imprevistos:imp, baseImponible:base,
    iva:Math.round(base*IVA), total:Math.round(base*(1+IVA))-25000
  };
}

function cleanJSON(raw){
  let s=raw.replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=s.indexOf("{"),b=s.lastIndexOf("}");
  if(a<0||b<0) throw new Error("No JSON en la respuesta");
  return s.slice(a,b+1).replace(/,(\s*[}\]])/g,"$1");
}

async function extractPDF(file){
  try{
    if(typeof pdfjsLib==="undefined") return "";
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
    let txt="";
    for(let i=1;i<=Math.min(pdf.numPages,10);i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      txt+=ct.items.map(x=>x.str).join(" ")+"\n";
    }
    return txt.trim();
  }catch(e){ return ""; }
}

function readB64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res({base64:e.target.result.split(",")[1],mimeType:file.type,name:file.name,preview:e.target.result});
    r.readAsDataURL(file);
  });
}

async function fetchConTimeout(url, opts, timeoutMs=120000){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const r = await fetch(url, {...opts, signal: ctrl.signal});
    clearTimeout(timer);
    return r;
  }catch(e){
    clearTimeout(timer);
    if(e.name==="AbortError") throw new Error("Tiempo de espera agotado (>2 min). Intentá sin fotos o con menos fotos.");
    throw new Error("No se pudo conectar al servidor. Verificá tu conexión e intentá de nuevo.");
  }
}

// ── Pasos ────────────────────────────────────────────────────────────────────
function goStep(n){
  S.step=n;
  [0,1,2,3].forEach(i=>{
    const el=document.getElementById("s"+i);
    el.className="step"+(i===n?" active":i<n?" done":"");
    el.textContent=i<n?"✓":i+1;
  });
  render();
}

// ── Render ───────────────────────────────────────────────────────────────────
function render(){
  const m=document.getElementById("main");
  if(S.step===0) m.innerHTML=renderInput();
  else if(S.step===1) m.innerHTML=renderProcessing();
  else if(S.step===2) m.innerHTML=renderReview();
  else if(S.step===3) m.innerHTML=renderExport();
  bindEvents();
}

// ── STEP 0: INPUT ─────────────────────────────────────────────────────────────
function renderInput(){
  const c=S.client;
  const fotoThumbs=S.fotos.map((f,i)=>`
    <div class="thumb-wrap">
      <img class="thumb" src="${esc(f.preview)}" alt="${esc(f.name)}">
      <button class="thumb-del" onclick="removeFoto(${i})">✕</button>
    </div>`).join("");
  const pdfChips=S.pdfs.map((p,i)=>`
    <span class="pdf-chip">📄 ${esc(p.name)}
      <button onclick="removePdf(${i})" style="background:none;border:none;color:#e74c3c;cursor:pointer">✕</button>
    </span>`).join("");
  return `
    <span class="sec">Información del cliente</span>
    <div class="g3" style="margin-bottom:20px">
      <div><span class="lbl">Nombre / Empresa</span><input class="inp" id="c-nombre" value="${esc(c.nombre)}" placeholder="Nathalie Alpizar"></div>
      <div><span class="lbl">Email</span><input class="inp" id="c-email" value="${esc(c.email)}" placeholder="correo@test.com"></div>
      <div><span class="lbl">Teléfono</span><input class="inp" id="c-telefono" value="${esc(c.telefono)}" placeholder="+506 8888-0000"></div>
      <div><span class="lbl">N° Referencia</span><input class="inp" id="c-referencia" value="${esc(c.referencia)}"></div>
      <div><span class="lbl">Revisión (REV.01, 02…)</span><input class="inp" id="c-revision" value="${esc(c.revision)}" placeholder="01 (opcional)"></div>
      <div><span class="lbl">Asunto (se autogenera)</span><input class="inp" id="c-asunto" value="${esc(c.asunto)}" placeholder="Remodelacion baño..."></div>
    </div>

    <span class="sec">Notas de la visita</span>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Escribí lo que anotó Melvin – sin formato, como un WhatsApp</p>
    <textarea class="inp" id="notas" rows="7" style="resize:vertical;font-family:monospace;font-size:13px;line-height:1.6"
      placeholder="Ej: Baño principal, San Francisco de Heredia. Demoler tina existente, cambiar enchape piso y paredes 19m2...">${esc(S.notas)}</textarea>

    <div class="voz-wrap">
      <div class="voz-bar">
        <button class="btn-voz" id="btn-voz" onclick="toggleVoz()">🎙 Grabar voz</button>
        <div class="voz-ondas" id="voz-ondas">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <span class="voz-status" id="voz-status"></span>
      </div>
      <div class="voz-interim" id="voz-interim"></div>
    </div>

    <div style="margin-top:16px">
      <span class="sec">📷 Fotos de la visita</span>
      <p style="font-size:12px;color:#888;margin-bottom:8px">La IA analiza las fotos para presupuestar con más precisión</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;margin-bottom:8px">
        ${fotoThumbs}
        <label class="cam-btn" title="Tomar foto con la cámara">
          <span style="font-size:22px">📷</span><span>Cámara</span>
          <input type="file" accept="image/*" capture="environment" multiple id="inp-fotos" style="display:none">
        </label>
        <label class="cam-btn" title="Seleccionar de la galería">
          <span style="font-size:22px">🖼️</span><span>Galería</span>
          <input type="file" accept="image/*" multiple id="inp-galeria" style="display:none">
        </label>
      </div>
      ${S.fotos.length>0?`<p style="font-size:11px;color:#1B3A6B">✅ ${S.fotos.length} foto(s) lista(s)</p>`:""}
    </div>

    <div style="margin-top:16px">
      <span class="sec">📄 Planos / Documentos PDF</span>
      <p style="font-size:12px;color:#888;margin-bottom:8px">Subí planos o documentos – la IA extrae medidas y especificaciones</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">
        ${pdfChips}
        <label class="pdf-btn">
          <span style="font-size:18px">📄</span><span>Subir PDF</span>
          <input type="file" accept="application/pdf" multiple id="inp-pdfs" style="display:none">
        </label>
      </div>
      ${S.pdfs.length>0?`<p style="font-size:11px;color:#1B3A6B">✅ ${S.pdfs.length} documento(s) listo(s)</p>`:""}
    </div>

    <div class="err-box" id="err-input"></div>
    <button class="btn btn-p" id="btn-procesar" style="margin-top:16px;width:100%;padding:13px;font-size:14px">
      ${S.fotos.length>0||S.pdfs.length>0?"⇒ Procesar notas + adjuntos":"⇒ Procesar notas y buscar precios"}
    </button>`;
}

// ── STEP 1: PROCESSING ────────────────────────────────────────────────────────
function renderProcessing(){
  return `<div style="text-align:center;padding:60px 20px">
    <div style="font-size:36px;margin-bottom:16px">⚙️</div>
    <div style="font-size:16px;font-weight:600;color:#1B3A6B;margin-bottom:8px" id="load-msg">Analizando notas...</div>
    <div style="font-size:13px;color:#aaa">Construplaza · EPA · El Lagar</div>
    <div class="progress"><div class="prog-fill"></div></div>
  </div>`;
}

// ── STEP 2: REVIEW ────────────────────────────────────────────────────────────
function renderReview(){
  const T=calcTotals();
  const c=S.client;
  const itemCards=S.items.map((item,ii)=>{
    const matRows=(item.materiales||[]).map((m,mi)=>`
      <tr>
        <td><input class="inp-xs" value="${esc(m.detalle)}" onchange="updMat(${ii},${mi},'detalle',this.value)"></td>
        <td><input class="inp-xs" value="${esc(m.und)}" onchange="updMat(${ii},${mi},'und',this.value)" style="width:50px"></td>
        <td><input class="inp-xs" type="number" value="${m.cantidad}" onchange="updMat(${ii},${mi},'cantidad',this.value)" style="width:70px"></td>
        <td><input class="inp-xs" type="number" value="${m.precio_unitario}" onchange="updMat(${ii},${mi},'precio_unitario',this.value)" style="width:90px"></td>
        <td style="font-weight:600;color:#1B3A6B">${fmt(m.cantidad*m.precio_unitario)}</td>
        <td><select class="inp-xs" onchange="updMat(${ii},${mi},'fuente',this.value)">
          ${["Construplaza","EPA","El Lagar","Estimado"].map(f=>`<option${m.fuente===f?" selected":""}>${f}</option>`).join("")}
        </select></td>
        <td><button onclick="delMat(${ii},${mi})" style="background:none;border:none;color:#e74c3c;cursor:pointer">✕</button></td>
      </tr>`).join("");
    return `<div class="card">
      <div class="g5">
        <div><span class="lbl">Actividad ${item.id}</span>
          <input class="inp-sm" value="${esc(item.descripcion)}" onchange="updItem(${ii},'descripcion',this.value)"></div>
        <div><span class="lbl">Días</span><input class="inp-sm" type="number" value="${item.dias}" onchange="updItem(${ii},'dias',this.value)"></div>
        <div><span class="lbl">Operarios</span><input class="inp-sm" type="number" value="${item.operarios}" onchange="updItem(${ii},'operarios',this.value)"></div>
        <div><span class="lbl">Ayudantes</span><input class="inp-sm" type="number" value="${item.ayudantes}" onchange="updItem(${ii},'ayudantes',this.value)"></div>
        <div><span class="lbl">Total MO</span><div style="font-size:13px;font-weight:600;color:#555;padding-top:8px">${fmt(item.moTotal)}</div></div>
      </div>
      <table class="tbl">
        <thead><tr><th>Material</th><th>Und</th><th>Cantidad</th><th>P. Unit.</th><th>Subtotal</th><th>Fuente</th><th></th></tr></thead>
        <tbody>${matRows}</tbody>
      </table>
      <div style="display:flex;justify-content:space-between;margin-top:8px;align-items:center">
        <button class="btn btn-s" onclick="addMat(${ii})" style="font-size:12px;padding:4px 10px">+ Material</button>
        <div style="font-size:13px">Mat: <b>${fmt(item.matTotal)}</b> | MO: <b>${fmt(item.moTotal)}</b> | <span style="color:#1B3A6B;font-weight:700">Total: ${fmt(item.subtotal)}</span></div>
      </div>
    </div>`;
  }).join("");

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px">
      <span class="sec" style="margin-bottom:0">Revisión del presupuesto</span>
      <div class="btn-row">
        <button class="btn btn-s" onclick="goStep(0)">← Volver</button>
        <button class="btn btn-p" onclick="goStep(3)">Aprobar ⇒</button>
      </div>
    </div>
    <div class="card g2" style="margin-bottom:16px">
      <div><span class="lbl">Ref</span><div style="font-weight:600;color:#1B3A6B">${esc(c.referencia)}${c.revision?" REV."+c.revision.padStart(2,"0"):""}</div></div>
      <div><span class="lbl">Cliente</span><div style="font-weight:600;color:#1B3A6B">${esc(c.nombre)}</div></div>
      <div><span class="lbl">Fecha</span><div style="font-weight:600;color:#1B3A6B">${new Date().toLocaleDateString("es-CR")}</div></div>
      <div><span class="lbl">Total</span><div style="font-weight:600;color:#1B3A6B">${fmt(T.total)}</div></div>
    </div>
    ${itemCards}

// ── Procesar notas ────────────────────────────────────────────────────────────
async function procesar(){
  const c=S.client;
  if(!c.nombre){ showErr("err-input","Completá el nombre del cliente."); return; }
  if(!S.notas.trim()&&S.fotos.length===0&&S.pdfs.length===0){ showErr("err-input","Agregá notas, fotos o un PDF."); return; }

  goStep(1);
  const msgs=["Analizando notas...","Interpretando fotos...","Estimando materiales...","Buscando precios CR...","Armando presupuesto..."];
  let mi=0;
  const iv=setInterval(()=>{ mi=(mi+1)%msgs.length; const el=document.getElementById("load-msg"); if(el) el.textContent=msgs[mi]; },2000);

  try{
    const r=await fetchConTimeout(BACKEND+"/api/procesar-notas",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({notas:S.notas,fotos:S.fotos,pdfs:S.pdfs})
    }, 120000);

    const data=await r.json();
    clearInterval(iv);
    if(!data.ok) throw new Error(data.error||"Error del servidor");
    const parsed=data.data;
    if(parsed.asunto&&!S.client.asunto) S.client.asunto=parsed.asunto;
    S.items=(parsed.items||[]).map(calcItem);
    goStep(2);
  }catch(e){
    clearInterval(iv);
    S.step=0;
    render();
    showErr("err-input","Error procesando: "+e.message);
  }
}

// ── FIX 3: Excel con fórmulas reales ─────────────────────────────────────────
window.doExcel = function(){
  const T=calcTotals(); const c=S.client;
  const fecha=new Date().toLocaleDateString("es-CR");
  const rev = c.revision ? " REV."+c.revision.padStart(2,"0") : "";
  const refLabel = (c.referencia||"COT") + rev;

  const wb=XLSX.utils.book_new();

  // ── HOJA 1: Detalle Interno con fórmulas ──────────────────────────────────
  const ws = {};
  const R = (r,c) => XLSX.utils.encode_cell({r,c});

  // Encabezados
  ws[R(0,0)]={t:"s",v:"SS REMODELACIONES - PRESUPUESTO INTERNO"};
  ws[R(1,0)]={t:"s",v:"Ref:"};    ws[R(1,1)]={t:"s",v:refLabel};
  ws[R(1,2)]={t:"s",v:"Fecha:"}; ws[R(1,3)]={t:"s",v:fecha};
  ws[R(1,4)]={t:"s",v:"Cliente:"}; ws[R(1,5)]={t:"s",v:c.nombre};
  ws[R(2,0)]={t:"s",v:"Proyecto:"}; ws[R(2,1)]={t:"s",v:c.asunto};

  // Columnas: Item|Desc|Und|Cant|Días|Op|Ay|Mat.Base|Mat+5%|MO Base|Utilidad|Total MO|TOTAL
  const COLS=["Item","Descripción","Und","Cant","Días","Op","Ay","Mat.Base","Mat+5%","MO Base","Utilidad 50%","Total MO","TOTAL"];
  COLS.forEach((h,ci)=>{ ws[R(4,ci)]={t:"s",v:h}; });

  let row=5; // 0-indexed row 5 = Excel row 6
  const itemStartRows=[];

  S.items.forEach(item=>{
    itemStartRows.push(row);
    const r=row;
    ws[R(r,0)]={t:"n",v:item.id};
    ws[R(r,1)]={t:"s",v:item.descripcion};
    ws[R(r,2)]={t:"s",v:item.unidad||"Und"};
    ws[R(r,3)]={t:"n",v:item.cantidad||1};
    ws[R(r,4)]={t:"n",v:item.dias||1};
    ws[R(r,5)]={t:"n",v:item.operarios||1};
    ws[R(r,6)]={t:"n",v:item.ayudantes||0};
    // Mat.Base = suma de qty*precio de sub-filas (valor calculado, los materiales son sub-filas)
    const matBase=Math.round((item.matTotal)/1.05);
    ws[R(r,7)]={t:"n",v:matBase};
    // Mat+5% = H * 1.05
    const exRow=r+1; // Excel 1-indexed = r+1+1 = r+2 but XLSX encode_cell is 0-indexed, so Excel row = r+1
    ws[R(r,8)]={t:"n",f:`H${r+1}*1.05`,v:item.matTotal};
    // MO Base = Dias * (Op*27000 + Ay*20000)
    ws[R(r,9)]={t:"n",f:`E${r+1}*(F${r+1}*27000+G${r+1}*20000)`,v:item.moBase};
    // Utilidad = MO Base * 0.5
    ws[R(r,10)]={t:"n",f:`J${r+1}*0.5`,v:item.moUtilidad};
    // Total MO = MO Base + Utilidad
    ws[R(r,11)]={t:"n",f:`J${r+1}+K${r+1}`,v:item.moTotal};
    // TOTAL = Mat+5% + Total MO
    ws[R(r,12)]={t:"n",f:`I${r+1}+L${r+1}`,v:item.subtotal};
    row++;

    // Sub-filas de materiales
    (item.materiales||[]).forEach(m=>{
      ws[R(row,1)]={t:"s",v:"  > "+m.detalle+" ("+m.fuente+")"};
      ws[R(row,2)]={t:"s",v:m.und};
      ws[R(row,3)]={t:"n",v:m.cantidad};
      ws[R(row,7)]={t:"n",v:m.precio_unitario};
      // Subtotal material = Cant * Precio
      ws[R(row,8)]={t:"n",f:`D${row+1}*H${row+1}`,v:m.cantidad*m.precio_unitario};
      row++;
    });
    row++; // blank row after each item
  });

  // Totales al final — referencias a celdas de items
  const totals=[
    ["Sub total", `=SUM(M6:M${row})`],
    ["Imprevistos 5%", `=${XLSX.utils.encode_col(11+1)}${row+2}*0.05`],
    ["Base imponible", `=${XLSX.utils.encode_col(11+1)}${row+2}+${XLSX.utils.encode_col(11+1)}${row+3}`],
    ["IVA 13%", `=${XLSX.utils.encode_col(11+1)}${row+4}*0.13`],
    ["Reembolso visita", -25000],
    ["TOTAL", `=${XLSX.utils.encode_col(11+1)}${row+4}*(1+0.13)-25000`],
  ];

  // Simplify: use computed values for summary rows with formula references
  const tRows=[
    ["Sub total", T.subtotal],
    ["Imprevistos 5%", T.imprevistos],
    ["Base imponible", T.baseImponible],
    ["IVA 13%", T.iva],
    ["Reembolso visita", -25000],
    ["TOTAL", T.total],
  ];

  // Write totals with formulas referencing M column
  const mCol = "M"; // col 12, 0-indexed
  const firstItemRow = 6; // Excel row 6 (0-indexed row 5)
  const lastItemRow = row - 1 + 1; // approximate - use actual item end rows

  tRows.forEach(([label,val],ti)=>{
    ws[R(row,11)]={t:"s",v:label};
    ws[R(row,12)]={t:"n",v:val};
    row++;
  });

  ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:row,c:12}});
  ws["!cols"]=[{wch:5},{wch:38},{wch:8},{wch:7},{wch:6},{wch:5},{wch:5},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,"Detalle Interno");

  // ── HOJA 2: Resumen Cotización ────────────────────────────────────────────
  const r2=[
    ["Descripción","Unidad","Cantidad","Materiales","M.O.","SUB TOTAL"],
    ...S.items.map(i=>[i.descripcion,i.unidad||"Und",i.cantidad||1,i.matTotal,i.moTotal,i.subtotal]),
    [],
    ["","","","","Sub total",T.subtotal],
    ["","","","","Imprevistos 5%",T.imprevistos],
    ["","","","","Base imponible",T.baseImponible],
    ["","","","","IVA 13%",T.iva],
    ["","","","","Reembolso visita",-25000],
    ["","","","","TOTAL",T.total]
  ];
  const ws2=XLSX.utils.aoa_to_sheet(r2);

  // Add SUB TOTAL formula = SUM of column F items
  const itemCount=S.items.length;
  const sumRange=`F2:F${itemCount+1}`;
  const sumRow=itemCount+2; // 0-indexed
  // Overwrite subtotal cell with formula
  const subtotalCell=XLSX.utils.encode_cell({r:sumRow+1,c:5});
  if(ws2[subtotalCell]) ws2[subtotalCell]={t:"n",f:`SUM(F2:F${itemCount+1})`,v:T.subtotal};

  ws2["!cols"]=[{wch:40},{wch:8},{wch:10},{wch:14},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws2,"Resumen Cotización");

  XLSX.writeFile(wb, nombreArchivo("presupuesto.xlsx"));
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function showErr(id,msg){ const el=document.getElementById(id); if(el){el.textContent=msg;el.style.display="block";} }

// ── 🎙 GRABADOR DE VOZ — Web Speech API + MediaRecorder fallback ──────────────
// Funciona en: Chrome Android/PC, Safari iOS 14.5+, Edge, Firefox (MediaRecorder)
let _recognition=null, _mediaRec=null, _audioChunks=[], _vozActiva=false, _vozModo=null;

function _detectarModo(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR) return 'speech';
  if(navigator.mediaDevices&&window.MediaRecorder) return 'media';
  return null;
}

function toggleVoz(){
  if(_vozActiva) _stopVoz();
  else _startVoz();
}

async function _startVoz(){
  _vozModo=_detectarModo();
  if(!_vozModo){
    _setStatus('⚠ Usá Chrome o Safari actualizado para grabar voz'); return;
  }
  if(_vozModo==='speech') _startSpeech();
  else await _startMedia();
}

function _startSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _recognition=new SR();
  _recognition.continuous=true;
  _recognition.interimResults=true;
  _recognition.lang='es-CR';
  _recognition.maxAlternatives=1;

  _recognition.onstart=()=>{ _vozActiva=true; _uiGrabando(true); _setStatus('Escuchando...'); };

  _recognition.onresult=(ev)=>{
    let interim='', final='';
    for(let i=ev.resultIndex;i<ev.results.length;i++){
      if(ev.results[i].isFinal) final+=ev.results[i][0].transcript+' ';
      else interim+=ev.results[i][0].transcript;
    }
    if(final){
      S.notas+=(S.notas&&!S.notas.endsWith(' ')?' ':'')+final.trim()+' ';
      const el=document.getElementById('notas'); if(el) el.value=S.notas;
    }
    const ip=document.getElementById('voz-interim');
    if(ip){ ip.textContent=interim; ip.className='voz-interim'+(interim?' visible':''); }
  };

  _recognition.onerror=(ev)=>{
    // 'no-speech' es normal — reiniciar silenciosamente
    if(ev.error==='no-speech'){ try{_recognition.start();}catch(e){} return; }
    if(ev.error==='not-allowed'){ _setStatus('⚠ Permiso de micrófono denegado'); _stopVoz(); return; }
    if(ev.error==='aborted') return;
    _setStatus('Error: '+ev.error);
    _stopVoz();
  };

  _recognition.onend=()=>{
    if(_vozActiva) try{ _recognition.start(); }catch(e){}
  };

  try{ _recognition.start(); }
  catch(e){ _setStatus('Error al iniciar: '+e.message); }
}

async function _startMedia(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,sampleRate:16000}});
    const mime=['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus','audio/ogg'].find(t=>{ try{return MediaRecorder.isTypeSupported(t);}catch(e){return false;} })||'';
    _mediaRec=new MediaRecorder(stream, mime?{mimeType:mime}:{});
    _audioChunks=[];
    _mediaRec.ondataavailable=e=>{ if(e.data&&e.data.size>0) _audioChunks.push(e.data); };
    _mediaRec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(_audioChunks,{type:_mediaRec.mimeType||'audio/webm'});
      await _transcribirAudio(blob);
    };
    _mediaRec.start(500);
    _vozActiva=true;
    _uiGrabando(true);
    _setStatus('Grabando… (sin transcripción automática en este navegador)');
  }catch(e){
    _setStatus('⚠ '+(e.name==='NotAllowedError'?'Permiso de micrófono denegado':e.message));
  }
}

function _stopVoz(){
  _vozActiva=false;
  if(_recognition){ try{_recognition.stop();}catch(e){} _recognition=null; }
  if(_mediaRec&&_mediaRec.state!=='inactive'){ _mediaRec.stop(); }
  _uiGrabando(false);
  const ip=document.getElementById('voz-interim');
  if(ip){ ip.textContent=''; ip.className='voz-interim'; }
}

async function _transcribirAudio(blob){
  // Intenta transcribir en el servidor vía Claude
  _setStatus('⏳ Transcribiendo audio…');
  try{
    const b64=await new Promise(res=>{
      const fr=new FileReader();
      fr.onload=e=>res(e.target.result.split(',')[1]);
      fr.readAsDataURL(blob);
    });
    const r=await fetchConTimeout(BACKEND+'/api/transcribir-voz',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({audio:b64,mimeType:blob.type})
    },30000);
    const data=await r.json();
    if(data.ok&&data.texto){
      S.notas+=(S.notas?' ':'')+data.texto.trim()+' ';
      const el=document.getElementById('notas'); if(el) el.value=S.notas;
      _setStatus('✅ Transcripción lista');
    } else {
      // Si el servidor no puede, guardar el audio localmente
      _ofrecerDescargarAudio(blob);
      _setStatus('Servidor no disponible — audio descargado');
    }
  }catch(e){
    _ofrecerDescargarAudio(blob);
    _setStatus('Audio guardado localmente');
  }
}

function _ofrecerDescargarAudio(blob){
  const url=URL.createObjectURL(blob);
  const ext=blob.type.includes('mp4')?'m4a':blob.type.includes('ogg')?'ogg':'webm';
  const a=document.createElement('a');
  a.href=url; a.download='nota_voz_'+Date.now()+'.'+ext;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },200);
}

function _uiGrabando(grabando){
  const btn=document.getElementById('btn-voz');
  const ondas=document.getElementById('voz-ondas');
  if(btn){
    btn.className='btn-voz'+(grabando?' grabando':'');
    btn.innerHTML=grabando?'⏹ Detener':'🎙 Grabar voz';
  }
  if(ondas) ondas.className='voz-ondas'+(grabando?' visible':'');
}

function _setStatus(msg){
  const el=document.getElementById('voz-status');
  if(el) el.textContent=msg;
}

window.toggleVoz=toggleVoz;

// ── Iniciar ───────────────────────────────────────────────────────────────────
render();
</script>
