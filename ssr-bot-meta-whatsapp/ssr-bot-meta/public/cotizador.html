<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cotizador SSR">
<title>Cotizador SSR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",Arial,sans-serif;background:#F4F6F9;min-height:100vh}
input,textarea,select,button{font-family:inherit}
@media(max-width:600px){input,textarea,select{font-size:16px!important}}
#app{max-width:960px;margin:0 auto}
.hdr{background:#1B3A6B;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:#D4541A;border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px;flex-shrink:0}
.steps{display:flex;gap:6px}
.step{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:rgba(255,255,255,.2);color:rgba(255,255,255,.4);transition:.2s}
.step.active{background:#D4541A;color:#fff}
.step.done{background:#2ECC71;color:#fff}
.body{padding:20px 16px}
.sec{font-size:14px;font-weight:600;color:#1B3A6B;border-bottom:2px solid #D4541A;padding-bottom:6px;margin-bottom:12px;display:block}
.lbl{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;display:block}
.inp{width:100%;border:1px solid #ddd;border-radius:6px;padding:9px 12px;font-size:13px;outline:none;background:#fff;color:#222}
.inp:focus{border-color:#1B3A6B}
.inp-sm{width:100%;border:1px solid #ddd;border-radius:4px;padding:6px 8px;font-size:12px;outline:none}
.inp-xs{border:1px solid #e5e5e5;border-radius:3px;padding:3px 6px;font-size:12px;outline:none;width:100%}
.btn{border:none;border-radius:6px;padding:10px 18px;font-size:13px;cursor:pointer;font-weight:600;transition:.15s}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-p{background:#1B3A6B;color:#fff}
.btn-s{background:#fff;color:#1B3A6B;border:1px solid #1B3A6B}
.btn-g{background:#1E8449;color:#fff}
.btn-o{background:#D4541A;color:#fff}
.card{background:#fff;border-radius:8px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g5{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 1fr;gap:8px;align-items:end;margin-bottom:10px}
@media(max-width:600px){.g2,.g3{grid-template-columns:1fr}.g5{grid-template-columns:1fr 1fr}}
.err-box{background:#ffeaea;border:1px solid #f5c6c6;border-radius:6px;padding:10px 14px;color:#c0392b;font-size:13px;margin-top:10px;display:none}
.ok-box{background:#f0fff4;border:1px solid #2ECC71;border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:13px;display:none}
.err-box2{background:#fff5f5;border:1px solid #e74c3c;border-radius:8px;padding:14px 18px;margin-bottom:16px;font-size:12px;display:none}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:5px 8px;color:#555;font-weight:500;background:#f5f7fb}
.tbl td{border-bottom:1px solid #eee;padding:4px 6px}
.thumb-wrap{position:relative;display:inline-block}
.thumb{width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid #ddd}
.thumb-del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#e74c3c;color:#fff;border:none;cursor:pointer;font-size:10px}
.cam-btn{width:72px;height:72px;border-radius:6px;border:2px dashed #1B3A6B;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:#1B3A6B;font-size:11px;text-align:center;background:#f0f4ff;vertical-align:top}
.pdf-btn{display:inline-flex;align-items:center;gap:6px;background:#f0f4ff;border:2px dashed #1B3A6B;border-radius:6px;padding:10px 16px;cursor:pointer;color:#1B3A6B;font-size:13px}
.pdf-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:12px}
.bar{height:3px;background:linear-gradient(to right,#D4541A,#1B3A6B)}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:16px}
.prog-fill{height:100%;width:60%;background:#1B3A6B;border-radius:2px;animation:slide 2s ease-in-out infinite}
@keyframes slide{0%{transform:translateX(-150%)}100%{transform:translateX(250%)}}
.tot-row{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid #eee}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.hidden{display:none}
.preview-tbl th{background:#1B3A6B;color:#fff;padding:6px 8px;font-size:10pt;text-align:right}
.preview-tbl th:first-child{text-align:left}
.preview-tbl td{border:1px solid #D9CFC7;padding:5px 8px;font-size:10pt}
/* ── Retry notice ── */
.retry-box{background:#fff8e1;border:1px solid #f9a825;border-radius:8px;padding:12px 16px;margin-top:12px;font-size:13px;color:#795548;text-align:center;display:none}
.retry-countdown{font-size:22px;font-weight:700;color:#D4541A;display:block;margin:4px 0}
</style>
</head>

  const moUtilidad=moBase*0.5;
  const moTotal=moBase+moUtilidad;
  return {...item,matTotal,moBase,moUtilidad,moTotal,subtotal:matTotal+moTotal};
}

function calcTotals(){
  const items=S.items;
  const subtotal=items.reduce((s,i)=>s+i.subtotal,0);
  const imp=Math.round(subtotal*IMP);
  const base=subtotal+imp;
  return {
    subtotalMat:items.reduce((s,i)=>s+i.matTotal,0),
    subtotalMO:items.reduce((s,i)=>s+i.moTotal,0),
    subtotal, imprevistos:imp, baseImponible:base,
    iva:Math.round(base*IVA), total:Math.round(base*(1+IVA))-25000
  };
}

function cleanJSON(raw){
  let s=raw.replace(/```json/gi,"").replace(/```/g,"").trim();
  const a=s.indexOf("{"),b=s.lastIndexOf("}");
  if(a<0||b<0) throw new Error("No JSON en la respuesta");
  return s.slice(a,b+1).replace(/,(\\s*[}\\]])/g,"$1");
}

async function extractPDF(file){
  try{
    if(typeof pdfjsLib==="undefined") return "";
    pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:new Uint8Array(ab)}).promise;
    let txt="";
    for(let i=1;i<=Math.min(pdf.numPages,10);i++){
      const pg=await pdf.getPage(i);
      const ct=await pg.getTextContent();
      txt+=ct.items.map(x=>x.str).join(" ")+"\\n";
    }
    return txt.trim();
  }catch(e){ return ""; }
}

// ── ✅ NUEVO: Comprimir imagen antes de enviar (reduce tokens \~80%) ─────────
// Redimensiona a máx 1024px y convierte a JPEG calidad 0.7
async function compressImage(base64, mimeType){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX = 1024;
      let {width:w, height:h} = img;
      if(w > MAX || h > MAX){
        if(w >= h){ h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL("image/jpeg", 0.7).split(",")[1];
      resolve({ base64: compressed, mimeType: "image/jpeg" });
    };
    img.onerror = ()=> resolve({ base64, mimeType }); // fallback sin comprimir
    img.src = `data:${mimeType};base64,${base64}`;
  });
}

async function readB64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>res({base64:e.target.result.split(",")[1],mimeType:file.type,name:file.name,preview:e.target.result});
    r.readAsDataURL(file);
  });
}

// ── ✅ NUEVO: Sleep helper ────────────────────────────────────────────────────
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── ✅ NUEVO: Countdown en UI durante el retry ────────────────────────────────
async function showRetryCountdown(segundos, intento, maxIntentos){
  const box = document.getElementById("retry-box");
  if(!box) return;
  box.style.display = "block";
  for(let i = segundos; i > 0; i--){
    const cntEl = box.querySelector(".retry-countdown");
    if(cntEl) cntEl.textContent = `${i}s`;
    const msgEl = box.querySelector(".retry-msg");
    if(msgEl) msgEl.textContent = `⏳ Límite de velocidad alcanzado. Reintentando (${intento}/${maxIntentos})...`;
    await sleep(1000);
    if(document.getElementById("retry-box") !== box) return; // salió del paso
  }
  box.style.display = "none";
}

// ── Fetch con timeout + retry automático en 429 ───────────────────────────────
async function fetchConTimeout(url, opts, timeoutMs=120000){
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), timeoutMs);
  try{
    const r = await fetch(url, {...opts, signal: ctrl.signal});
    clearTimeout(timer);
    return r;
  }catch(e){
    clearTimeout(timer);
    if(e.name==="AbortError") throw new Error("Tiempo de espera agotado (>2 min). Intentá sin fotos o con menos fotos.");
    throw new Error("No se pudo conectar al servidor. Verificá tu conexión e intentá de nuevo.");
  }
}

// ── ✅ NUEVO: Fetch con retry automático en rate limit (429) ──────────────────
async function fetchConRetry(url, opts, timeoutMs=120000){
  let lastError;
  for(let intento = 1; intento <= MAX_RETRIES + 1; intento++){
    try{
      const r = await fetchConTimeout(url, opts, timeoutMs);
      // Si es 429, leer el body y reintentar con backoff
      if(r.status === 429){
        let waitMs = RETRY_BASE_MS * Math.pow(2, intento - 1); // 15s, 30s, 60s
        // Intentar leer Retry-After del header
        const retryAfter = r.headers.get("Retry-After");
        if(retryAfter) waitMs = Math.max(waitMs, parseInt(retryAfter) * 1000);
        if(intento > MAX_RETRIES) throw new Error(`Límite de velocidad de la IA alcanzado. Intentá de nuevo en 1 minuto, o reducí la cantidad de fotos.`);
        // Mostrar countdown al usuario
        await showRetryCountdown(Math.round(waitMs/1000), intento, MAX_RETRIES);
        // Actualizar mensaje de loading
        const loadEl = document.getElementById("load-msg");
        if(loadEl) loadEl.textContent = "Reintentando con la IA...";
        continue; // reintentar
      }
      return r; // 200 u otro status: devolver normalmente
    }catch(e){
      lastError = e;
      // Si el error no es de red/timeout, no reintentar
      if(!e.message.includes("conectar") && !e.message.includes("agotado")) throw e;
      if(intento > MAX_RETRIES) throw e;
    }
  }
  throw lastError || new Error("Error desconocido");
}

// ── Event bindings ────────────────────────────────────────────────────────────
function bindEvents(){
  ["nombre","email","telefono","referencia","asunto"].forEach(f=>{
    const el=document.getElementById("c-"+f);
    if(el) el.addEventListener("input",e=>{ S.client[f]=e.target.value; });
  });
  const notasEl=document.getElementById("notas");
  if(notasEl) notasEl.addEventListener("input",e=>{ S.notas=e.target.value; });

  const fEl=document.getElementById("inp-fotos");
  if(fEl) fEl.addEventListener("change",async e=>{
    const imgs=await Promise.all(Array.from(e.target.files||[]).map(readB64));
    S.fotos=[...S.fotos,...imgs].slice(0,8);
    render();
  });

  const gEl=document.getElementById("inp-galeria");
  if(gEl) gEl.addEventListener("change",async e=>{
    const imgs=await Promise.all(Array.from(e.target.files||[]).map(readB64));
    S.fotos=[...S.fotos,...imgs].slice(0,8);
    render();
  });

  const pEl=document.getElementById("inp-pdfs");
  if(pEl) pEl.addEventListener("change",async e=>{
    const txts=await Promise.all(Array.from(e.target.files||[]).map(async f=>({name:f.name,text:await extractPDF(f)})));
    S.pdfs=[...S.pdfs,...txts].slice(0,3);
    render();
  });

  const bEl=document.getElementById("btn-procesar");
  if(bEl) bEl.addEventListener("click",procesar);
}

// ── Acciones globales ─────────────────────────────────────────────────────────
window.removeFoto = i=>{ S.fotos.splice(i,1); render(); };
window.removePdf  = i=>{ S.pdfs.splice(i,1); render(); };
window.goStep     = goStep;

window.updItem = (ii,f,v)=>{
  const item={...S.items[ii],[f]:isNaN(v)||f==="descripcion"||f==="unidad"?v:parseFloat(v)||0};
  S.items[ii]=calcItem(item);
  updateTotalsDisplay();

window.updMat = (ii,mi,f,v)=>{
  const item=S.items[ii];
  item.materiales[mi]={...item.materiales[mi],[f]:isNaN(v)||f==="detalle"||f==="und"||f==="fuente"?v:parseFloat(v)||0};
  S.items[ii]=calcItem(item);
  updateTotalsDisplay();
};

window.addMat = ii=>{
  S.items[ii].materiales.push({detalle:"",und:"Und",cantidad:1,precio_unitario:0,fuente:"Construplaza"});
  S.items[ii]=calcItem(S.items[ii]);
  render();

window.delMat = (ii,mi)=>{
  S.items[ii].materiales.splice(mi,1);

function updateTotalsDisplay(){
  S.items.forEach((item,ii)=>{
    // Header MO display
    const moEl=document.querySelector(`[data-mo="${ii}"]`);
    if(moEl) moEl.textContent=fmt(item.moTotal);
    // Bottom bar
    const matEl=document.querySelector(`[data-mat="${ii}"]`);
    if(matEl) matEl.textContent=fmt(item.matTotal);
    const mobarEl=document.querySelector(`[data-mobar="${ii}"]`);
    if(mobarEl) mobarEl.textContent=fmt(item.moTotal);
    const subEl=document.querySelector(`[data-sub="${ii}"]`);
    if(subEl) subEl.textContent='Total: '+fmt(item.subtotal);
  });
  // Global totals panel
  const T=calcTotals();
  const m={'tot-gmat':T.subtotalMat,'tot-gmo':T.subtotalMO,'tot-gsub':T.subtotal,
    'tot-gimpr':T.imprevistos,'tot-gbase':T.baseImponible,'tot-giva':T.iva,
    'tot-grem':-25000,'tot-gtotal':T.total,'tot-summary':T.total};
  Object.entries(m).forEach(([id,v])=>{const el=document.getElementById(id);if(el) el.textContent=fmt(v);});
}

// ── Procesar notas ────────────────────────────────────────────────────────────
async function procesar(){
  const c=S.client;
  if(!c.nombre){ showErr("err-input","Completá el nombre del cliente."); return; }
  if(!S.notas.trim()&&S.fotos.length===0&&S.pdfs.length===0){ showErr("err-input","Agregá notas, fotos o un PDF."); return; }

  goStep(1);
  const msgs=["Analizando notas...","Interpretando fotos...","Estimando materiales...","Buscando precios CR...","Armando presupuesto..."];
  let mi=0;
  const iv=setInterval(()=>{ mi=(mi+1)%msgs.length; const el=document.getElementById("load-msg"); if(el) el.textContent=msgs[mi]; },2000);

  try{
    // ✅ Comprimir fotos antes de enviar (reduce tokens \~80%)
    const fotosComprimidas = await Promise.all(
      S.fotos.map(async f => {
        const { base64, mimeType } = await compressImage(f.base64, f.mimeType);
        return { ...f, base64, mimeType };
      })
    );

    // ✅ fetchConRetry: maneja 429 automáticamente con countdown visible
    const r = await fetchConRetry(BACKEND+"/api/procesar-notas",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({notas:S.notas, fotos:fotosComprimidas, pdfs:S.pdfs})
    }, 120000);

    const data=await r.json();
    clearInterval(iv);
    if(!data.ok) throw new Error(data.error||"Error del servidor");
    const parsed=data.data;
    if(parsed.asunto&&!S.client.asunto) S.client.asunto=parsed.asunto;
    S.items=(parsed.items||[]).map(calcItem);
    goStep(2);
  }catch(e){
    clearInterval(iv);
    S.step=0;
    render();
    showErr("err-input","Error procesando: "+e.message);
  }
}

// ── Guardar en Drive ──────────────────────────────────────────────────────────
window.saveToDrive = async function(){
  // ✅ REV: si ya guardamos antes, incrementar revisión
  if(S.driveOk){ S.revision++; }
  S.saving=true; S.driveOk=null; S.driveErr=null;
  const btn=document.getElementById("btn-drive");
  if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin">⟳</span> Guardando...'; }
  try{
    const r=await fetchConTimeout(BACKEND+"/api/cotizacion",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({client:S.client,items:S.items,revision:S.revision})
    }, 60000);
    const data=await r.json();
    if(data.ok){ S.driveOk=data; }
    else{ S.driveErr=data.error||"Error del servidor"; }
  }catch(e){ S.driveErr=e.message; }
  S.saving=false;
  render();
};

  const rows=[["SS REMODELACIONES - PRESUPUESTO INTERNO"],["Ref:",c.referencia,"Fecha:",fecha,"Cliente:",c.nombre],["Proyecto:",c.asunto],[],
    ["Item","Descripcion","Und","Cant","Dias","Op","Ay","Mat.Base","Mat+5%","MO","Util","Total MO","TOTAL"]];
  S.items.forEach(item=>{
    rows.push([item.id,item.descripcion,item.unidad||"Und",item.cantidad||1,item.dias,item.operarios,item.ayudantes,
      Math.round(item.matTotal/1.05),item.matTotal,item.moBase,item.moUtilidad,item.moTotal,item.subtotal]);
    (item.materiales||[]).forEach(m=>rows.push(["","  > "+m.detalle+" ("+m.fuente+")",m.und,m.cantidad,m.precio_unitario,m.cantidad*m.precio_unitario]));
    rows.push(["","Subtotal mat:","","","","","","",item.matTotal]);rows.push([]);
  });
  rows.push(["","Sub total","","","","","","","",T.subtotal]);
  rows.push(["","Imprevistos 5%","","","","","","","",T.imprevistos]);
  rows.push(["","Base imponible","","","","","","","",T.baseImponible]);
  rows.push(["","IVA 13%","","","","","","","",T.iva]);
  rows.push(["","Reembolso visita","","","","","","","",-25000]);
  rows.push(["","TOTAL","","","","","","","",T.total]);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:5},{wch:38},{wch:8},{wch:7},{wch:6},{wch:5},{wch:5},{wch:12},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,"Detalle Interno");
  const n=S.items.length;
  const r2=[["Descripcion","Unidad","Cantidad","Materiales","MO","SUB TOTAL"],
    ...S.items.map(i=>[i.descripcion,i.unidad||"Und",i.cantidad||1,i.matTotal,i.moTotal,0]),
    [],["","","","","Sub total",0],["","","","","Imprevistos 5%",0],
    ["","","","","Base imponible",0],["","","","","IVA 13%",0],
    ["","","","","Reembolso visita",-25000],["","","","","TOTAL",0]];
  const ws2=XLSX.utils.aoa_to_sheet(r2);
  // ✅ Fórmulas automáticas en SUB TOTAL de cada actividad
  for(let i=0;i<n;i++){ ws2['F'+(i+2)]={t:'n',f:'D'+(i+2)+'+E'+(i+2)}; }
  // ✅ Fórmulas en sección de resumen
  const sr=n+3,ir=n+4,br=n+5,vr=n+6,rr=n+7,tr=n+8;
  ws2['F'+sr]={t:'n',f:'SUM(F2:F'+(n+1)+')'}; // Sub total
  ws2['F'+ir]={t:'n',f:'F'+sr+'*0.05'};           // Imprevistos 5%
  ws2['F'+br]={t:'n',f:'F'+sr+'+F'+ir};           // Base imponible
  ws2['F'+vr]={t:'n',f:'F'+br+'*0.13'};           // IVA 13%
  ws2['F'+tr]={t:'n',f:'F'+br+'+F'+vr+'+F'+rr}; // TOTAL
  ws2["!cols"]=[{wch:40},{wch:8},{wch:10},{wch:14},{wch:14},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws2,"Resumen Cotizacion");
  XLSX.writeFile(wb,c.referencia+(S.revision>0?'_REV'+S.revision:'')+"_presupuesto_interno.xlsx");
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function showErr(id,msg){ const el=document.getElementById(id); if(el){el.textContent=msg;el.style.display="block";} }

// ── Grabador de voz ──────────────────────────────────────────────────────────
var _micRec = null;
var _micOn = false;

function toggleMic(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    var err=document.getElementById('mic-error');
    if(err){err.style.display='block';err.textContent='Tu navegador no soporta grabación. Usá Chrome o Edge.';}
    return;
  }
  if(_micOn){ _stopMic(); } else { _startMic(); }
}

function _startMic(){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  _micRec=new SR();
  _micRec.lang='es-CR';
  _micRec.continuous=true;
  _micRec.interimResults=true;

  _micRec.onstart=function(){
    _micOn=true;
    var btn=document.getElementById('btn-mic');
    if(btn){btn.style.background='#e74c3c';btn.style.color='#fff';btn.style.borderColor='#e74c3c';}
    var lbl=document.getElementById('mic-label');
    if(lbl) lbl.textContent='⏹ Detener grabación';
    var st=document.getElementById('mic-status');
    if(st) st.textContent='🔴 Grabando...';
    var err=document.getElementById('mic-error');
    if(err) err.style.display='none';
  };

  _micRec.onresult=function(e){
    var interim='', final='';
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
      else interim+=e.results[i][0].transcript;
    }
    if(final){
      var ta=document.getElementById('notas');
      if(ta){ta.value+=final;S.notas=ta.value;}
    }
    var st=document.getElementById('mic-status');
    if(st) st.textContent=interim?'🔴 '+interim:'🔴 Grabando...';
  };

  _micRec.onerror=function(e){
    _stopMic();
    var err=document.getElementById('mic-error');
    if(err){err.style.display='block';err.textContent='Error micrófono: '+e.error;}
  };

  _micRec.onend=function(){ if(_micOn) _micRec.start(); };
  _micRec.start();
}

function _stopMic(){
  _micOn=false;
  if(_micRec){_micRec.onend=null;_micRec.stop();_micRec=null;}
  var btn=document.getElementById('btn-mic');
  if(btn){btn.style.background='';btn.style.color='';btn.style.borderColor='';}
  var lbl=document.getElementById('mic-label');
  if(lbl) lbl.textContent='🎤 Grabar nota de voz';
  var st=document.getElementById('mic-status');
  if(st){st.textContent='✅ Nota guardada';setTimeout(function(){if(st)st.textContent='';},3000);}
}

// ── Iniciar ───────────────────────────────────────────────────────────────────
render();
